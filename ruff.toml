line-length = 100
target-version = "py311"

[lint]
select = ["E", "F", "W", "I", "N", "UP", "B"]
ignore = [
  "E501",  # line too long (handled by formatter)
  "B008",  # do not perform function calls in default arguments
]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = true